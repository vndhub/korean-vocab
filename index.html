<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한국어 단어 — Korean Vocab SC1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5B3FA0;
  --purple-light: #8B6FCF;
  --purple-bg: #F3EEFF;
  --green: #2ECC71;
  --red: #E74C3C;
  --orange: #F39C12;
  --bg: #FAF7FF;
  --card: #FFFFFF;
  --text: #2C2C2C;
  --muted: #9B8FBF;
  --border: #EDE8F5;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ─── SCREENS ─── */
.screen { display: none; padding: 16px 16px 100px; min-height: 100vh; animation: fadeIn .3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── HEADER ─── */
.header { display:flex; justify-content:space-between; align-items:center; padding:12px 0 20px; }
.header-title { font-size:26px; font-weight:900; color:var(--purple); line-height:1.2; }
.header-sub { font-size:12px; color:var(--muted); font-weight:400; }
.header-btns { display:flex; gap:6px; }
.icon-btn { width:40px; height:40px; border-radius:12px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow: 0 2px 8px rgba(91,63,160,.08); }

/* ─── PROGRESS CARD ─── */
.progress-card { background:var(--card); border-radius:20px; padding:20px; box-shadow:0 4px 24px rgba(91,63,160,.08); margin-bottom:20px; }
.progress-row { display:flex; justify-content:space-around; margin-bottom:14px; text-align:center; }
.p-num { font-size:28px; font-weight:900; color:var(--purple); }
.p-num.red { color:var(--red); }
.p-num.green { color:var(--green); }
.p-label { font-size:11px; color:var(--muted); margin-top:2px; }
.bar-bg { height:8px; background:var(--purple-bg); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; background:linear-gradient(90deg,#667EEA,#764BA2); border-radius:4px; transition:width .5s; }
.bar-text { font-size:11px; color:var(--muted); text-align:center; margin-top:6px; }
.review-btn { width:100%; padding:13px; margin-top:12px; border-radius:14px; background:linear-gradient(135deg,var(--red),#C0392B); color:#fff; font-size:15px; font-weight:700; }

/* ─── UNITS GRID ─── */
.units-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.unit-card { background:var(--card); border-radius:16px; padding:14px 6px 10px; text-align:center; box-shadow:0 2px 12px rgba(91,63,160,.06); transition:transform .15s; }
.unit-card:active { transform:scale(.96); }
.unit-icon { font-size:26px; margin-bottom:4px; }
.unit-num { font-size:9px; color:var(--muted); font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
.unit-kr { font-size:15px; font-weight:900; color:var(--purple); }
.unit-vi { font-size:9px; color:var(--muted); margin-bottom:6px; }
.unit-bar { height:3px; background:var(--purple-bg); border-radius:2px; overflow:hidden; margin:0 4px; }
.unit-bar-fill { height:100%; background:linear-gradient(90deg,#667EEA,#764BA2); border-radius:2px; }
.unit-count { font-size:9px; color:var(--muted); margin-top:4px; }

/* ─── TOP BAR ─── */
.top-bar { display:flex; align-items:center; gap:10px; padding:10px 0 16px; }
.back-btn { background:none; font-size:14px; color:#667EEA; font-weight:700; padding:6px 0; }
.top-title { font-size:15px; font-weight:700; color:var(--purple); flex:1; }

/* ─── UNIT DETAIL ─── */
.unit-hero { text-align:center; font-size:18px; color:var(--muted); margin-bottom:18px; font-weight:300; }
.group-card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(91,63,160,.06); }
.group-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.group-name { font-size:14px; font-weight:700; color:var(--purple); }
.group-count { font-size:11px; color:var(--muted); font-weight:600; }
.word-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
.word-chip { padding:3px 10px; border-radius:20px; border:1px solid var(--border); background:var(--purple-bg); font-size:12px; color:#5A4A8A; }
.more-words { font-size:11px; color:var(--muted); align-self:center; margin-left:4px; }
.group-btns { display:flex; gap:8px; }
.btn-flash { flex:1; padding:10px; border-radius:12px; background:linear-gradient(135deg,#667EEA,#764BA2); color:#fff; font-size:13px; font-weight:700; }
.btn-quiz { flex:1; padding:10px; border-radius:12px; border:2px solid #667EEA; background:#fff; color:#667EEA; font-size:13px; font-weight:700; }

/* ─── FLASHCARD ─── */
.fc-counter { text-align:center; color:var(--muted); font-size:13px; font-weight:600; margin-bottom:14px; }
.fc-wrapper { perspective:1000px; margin-bottom:20px; }
.fc-inner { width:100%; min-height:300px; position:relative; transition:transform .5s ease; transform-style:preserve-3d; }
.fc-inner.flipped { transform:rotateY(180deg); }
.fc-face { position:absolute; width:100%; min-height:300px; backface-visibility:hidden; border-radius:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.fc-front { background:var(--card); box-shadow:0 8px 32px rgba(91,63,160,.12); }
.fc-back { background:linear-gradient(135deg,#667EEA,#764BA2); transform:rotateY(180deg); color:#fff; box-shadow:0 8px 32px rgba(91,63,160,.2); }
.fc-emoji { font-size:44px; margin-bottom:10px; }
.fc-kr { font-size:40px; font-weight:900; color:var(--purple); margin-bottom:6px; }
.fc-rom { font-size:15px; color:var(--muted); margin-bottom:12px; }
.fc-speak { font-size:28px; background:none; margin-bottom:6px; }
.fc-hint { font-size:11px; color:#ccc; }
.fc-kr-sm { font-size:22px; font-weight:700; opacity:.9; margin-bottom:6px; }
.fc-vi { font-size:26px; font-weight:800; margin-bottom:6px; }
.fc-en { font-size:15px; opacity:.8; }
.fc-rom-back { font-size:13px; opacity:.7; margin-top:4px; }
.rate-row { display:flex; gap:8px; justify-content:center; }
.rate-btn { padding:12px 14px; border-radius:14px; color:#fff; font-size:13px; font-weight:700; flex:1; max-width:130px; }
.rate-again { background:var(--red); }
.rate-hard { background:var(--orange); }
.rate-easy { background:var(--green); }

/* ─── QUIZ ─── */
.quiz-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.quiz-score { font-size:15px; font-weight:700; color:var(--green); }
.quiz-card { background:var(--card); border-radius:20px; padding:24px; text-align:center; margin-bottom:18px; box-shadow:0 4px 20px rgba(91,63,160,.08); }
.quiz-mode { font-size:12px; color:var(--muted); margin-bottom:8px; }
.quiz-prompt { font-size:30px; font-weight:900; color:var(--purple); }
.quiz-speak { margin-top:10px; padding:6px 16px; border-radius:20px; background:var(--purple-bg); color:#667EEA; font-size:12px; font-weight:600; }
.opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.opt-btn { padding:14px 10px; border-radius:14px; border:2px solid #E0E0E0; background:#fff; font-size:15px; font-weight:600; transition:all .25s; }
.opt-btn.correct { background:#D5F5E3; border-color:var(--green); color:#1A7A3A; }
.opt-btn.wrong { background:#FADBD8; border-color:var(--red); color:#C0392B; }

/* ─── DONE ─── */
.done-card { background:var(--card); border-radius:24px; padding:48px 24px; text-align:center; margin-top:40px; box-shadow:0 8px 32px rgba(91,63,160,.12); }
.done-emoji { font-size:60px; margin-bottom:14px; }
.done-title { font-size:26px; font-weight:900; color:var(--purple); margin-bottom:6px; }
.done-sub { font-size:15px; color:var(--muted); margin-bottom:24px; }
.done-btn { padding:12px 32px; border-radius:14px; background:linear-gradient(135deg,#667EEA,#764BA2); color:#fff; font-size:15px; font-weight:700; }

/* ─── CHECKLIST ─── */
.checklist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.checklist-stats { font-size:13px; color:var(--muted); }
.checklist-filter { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; border:1.5px solid var(--border); background:var(--card); color:var(--muted); }
.filter-btn.active { background:var(--purple); color:#fff; border-color:var(--purple); }
.cl-unit-group { margin-bottom:16px; }
.cl-unit-title { font-size:14px; font-weight:800; color:var(--purple); margin-bottom:8px; padding:6px 12px; background:var(--purple-bg); border-radius:10px; }
.cl-word { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid #F5F2FA; }
.cl-word:last-child { border-bottom:none; }
.cl-check { width:22px; height:22px; border-radius:6px; border:2px solid #D0C8E0; background:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; transition:all .2s; }
.cl-check.checked { background:var(--green); border-color:var(--green); color:#fff; }
.cl-info { flex:1; min-width:0; }
.cl-kr { font-size:16px; font-weight:700; color:var(--purple); }
.cl-vi { font-size:12px; color:var(--muted); }
.cl-speak-btn { width:32px; height:32px; border-radius:8px; background:var(--purple-bg); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.cl-card { background:var(--card); border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(91,63,160,.06); }

/* ─── STATS ─── */
.stat-row { display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px; padding:11px 12px; margin-bottom:8px; box-shadow:0 2px 8px rgba(91,63,160,.04); }
.stat-icon { font-size:22px; width:32px; text-align:center; }
.stat-info { flex:1; }
.stat-title { font-size:12px; font-weight:700; color:var(--purple); margin-bottom:4px; }
.stat-nums { text-align:right; }
.stat-learned { font-size:12px; font-weight:700; color:var(--purple); }
.stat-mastered { font-size:10px; color:var(--orange); }
.reset-btn { width:100%; padding:12px; margin-top:20px; border-radius:12px; border:2px solid var(--red); background:#fff; color:var(--red); font-size:13px; font-weight:700; }

/* ─── TOAST ─── */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:12px; font-size:13px; font-weight:600; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; max-width:90%; text-align:center; }
.toast.show { opacity:1; }
.toast.success { background:#D5F5E3; color:#1A7A3A; border:1px solid #27AE60; }
.toast.error { background:#FADBD8; color:#C0392B; border:1px solid #E74C3C; }
.toast.info { background:#D6EAF8; color:#2471A3; border:1px solid #3498DB; }
.storage-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 10px; border-radius:20px; }
.storage-status.ok { background:#D5F5E3; color:#1A7A3A; }
.storage-status.fail { background:#FADBD8; color:#C0392B; }

/* ─── BACKUP ─── */
.backup-section { margin-top:20px; padding:16px; background:var(--card); border-radius:16px; box-shadow:0 2px 12px rgba(91,63,160,.06); }
.backup-title { font-size:14px; font-weight:700; color:var(--purple); margin-bottom:10px; }
.backup-btns { display:flex; gap:8px; }
.backup-btn { flex:1; padding:10px; border-radius:12px; font-size:12px; font-weight:700; }
.backup-export { background:var(--purple-bg); color:var(--purple); border:1.5px solid var(--border); }
.backup-import { background:#fff; color:#667EEA; border:1.5px solid #667EEA; position:relative; overflow:hidden; }
.backup-import input { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* ─── NAV ─── */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100; padding:6px 0 env(safe-area-inset-bottom, 8px); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0; background:none; font-size:10px; color:var(--muted); font-weight:600; }
.nav-btn.active { color:var(--purple); }
.nav-icon { font-size:22px; }
</style>
</head>
<body>

<!-- ═══════════ TOAST ═══════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════ HOME ═══════════ -->
<div id="home" class="screen active">
  <div class="header">
    <div>
      <div class="header-title">한국어 단어</div>
      <div class="header-sub">Korean Vocabulary · Sơ cấp 1 <span id="storage-badge" class="storage-status"></span></div>
    </div>
  </div>
  <div class="progress-card">
    <div class="progress-row">
      <div><div class="p-num" id="p-learned">0</div><div class="p-label">Đã học</div></div>
      <div><div class="p-num" id="p-due">0</div><div class="p-label">Cần ôn</div></div>
      <div><div class="p-num" id="p-total">0</div><div class="p-label">Tổng từ</div></div>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="p-bar" style="width:0%"></div></div>
    <div class="bar-text" id="p-pct">0% hoàn thành</div>
    <button class="review-btn" id="review-btn" style="display:none" onclick="startReview()">🔄 Ôn tập ngay</button>
  </div>
  <div class="units-grid" id="units-grid"></div>
</div>

<!-- ═══════════ UNIT DETAIL ═══════════ -->
<div id="unit-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('home')">← Quay lại</button>
    <div class="top-title" id="unit-top-title"></div>
  </div>
  <div class="unit-hero" id="unit-hero"></div>
  <div id="unit-groups"></div>
</div>

<!-- ═══════════ FLASHCARD ═══════════ -->
<div id="fc-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="fc-back-btn">← Quay lại</button>
    <div class="top-title" id="fc-title"></div>
  </div>
  <div class="fc-counter" id="fc-counter"></div>
  <div class="fc-wrapper" id="fc-wrapper">
    <div class="fc-inner" id="fc-inner">
      <div class="fc-face fc-front">
        <div class="fc-emoji" id="fc-emoji"></div>
        <div class="fc-kr" id="fc-kr"></div>
        <div class="fc-rom" id="fc-rom"></div>
        <button class="fc-speak" id="fc-speak-btn">🔊</button>
        <div class="fc-hint">Nhấn để lật thẻ</div>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-emoji" id="fc-emoji2"></div>
        <div class="fc-kr-sm" id="fc-kr2"></div>
        <div class="fc-vi" id="fc-vi"></div>
        <div class="fc-en" id="fc-en"></div>
        <div class="fc-rom-back" id="fc-rom2"></div>
      </div>
    </div>
  </div>
  <div class="rate-row" id="fc-rates" style="display:none">
    <button class="rate-btn rate-again" onclick="rateCard(0)">😣 Lại</button>
    <button class="rate-btn rate-hard" onclick="rateCard(2)">🤔 Khó</button>
    <button class="rate-btn rate-easy" onclick="rateCard(3)">😊 Nhớ</button>
  </div>
</div>

<!-- ═══════════ QUIZ ═══════════ -->
<div id="quiz-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="quiz-back-btn">← Quay lại</button>
    <div class="top-title" id="quiz-title"></div>
  </div>
  <div class="quiz-top">
    <div class="fc-counter" id="quiz-counter"></div>
    <div class="quiz-score" id="quiz-score">✅ 0</div>
  </div>
  <div class="quiz-card">
    <div class="quiz-mode" id="quiz-mode"></div>
    <div class="quiz-prompt" id="quiz-prompt"></div>
    <button class="quiz-speak" id="quiz-speak" style="display:none" onclick="speakKorean(quizState.currentPromptKr)">🔊 Nghe</button>
  </div>
  <div class="opts-grid" id="quiz-opts"></div>
</div>

<!-- ═══════════ CHECKLIST ═══════════ -->
<div id="checklist-screen" class="screen">
  <div class="top-bar">
    <div class="top-title">📋 Danh sách từ vựng</div>
  </div>
  <div class="checklist-header">
    <div class="checklist-stats" id="cl-stats"></div>
  </div>
  <div class="checklist-filter" id="cl-filter"></div>
  <div id="cl-list"></div>
</div>

<!-- ═══════════ STATS ═══════════ -->
<div id="stats-screen" class="screen">
  <div class="top-bar">
    <div class="top-title">📊 Thống kê</div>
  </div>
  <div id="stats-list"></div>
  <div class="backup-section">
    <div class="backup-title">💾 Sao lưu dữ liệu</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Export để backup, Import để khôi phục tiến trình</div>
    <div class="backup-btns">
      <button class="backup-btn backup-export" onclick="exportData()">📤 Export</button>
      <button class="backup-btn backup-import">📥 Import<input type="file" accept=".json" onchange="importData(event)"></button>
    </div>
  </div>
  <button class="reset-btn" onclick="if(confirm('Reset toàn bộ tiến trình?')){srData={};checkedWords={};saveAll();renderAll();}">🗑️ Reset tất cả</button>
</div>

<!-- ═══════════ DONE ═══════════ -->
<div id="done-screen" class="screen">
  <div class="done-card">
    <div class="done-emoji" id="done-emoji">🎉</div>
    <div class="done-title" id="done-title">Hoàn thành!</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="done-btn" id="done-btn">← Quay lại</button>
  </div>
</div>

<!-- ═══════════ BOTTOM NAV ═══════════ -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')"><span class="nav-icon">🏠</span>Học</button>
  <button class="nav-btn" id="nav-checklist" onclick="showScreen('checklist-screen')"><span class="nav-icon">📋</span>Từ vựng</button>
  <button class="nav-btn" id="nav-stats" onclick="showScreen('stats-screen')"><span class="nav-icon">📊</span>Thống kê</button>
</div>

<script>
// ═══════════════════════════════════════════════════════

// STORAGE — localStorage for persistent data on web
// ═══════════════════════════════════════════════════════
let storageOk = false;

function showToast(msg, type, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || 'info');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration || 2500);
}

function updateStorageBadge() {
  const el = document.getElementById('storage-badge');
  if (!el) return;
  if (storageOk) { el.textContent = '💾 Saved'; el.className = 'storage-status ok'; }
  else { el.textContent = '⚠️ No storage'; el.className = 'storage-status fail'; }
}

function loadData() {
  try {
    const s1 = localStorage.getItem('kr-vocab-sr');
    if (s1) srData = JSON.parse(s1);
    const s2 = localStorage.getItem('kr-vocab-checked');
    if (s2) checkedWords = JSON.parse(s2);
    storageOk = true;
  } catch(e) {
    storageOk = false;
  }
  updateStorageBadge();
  const lc = getLearnedCount(), cc = getCheckedCount();
  if (lc > 0 || cc > 0) {
    showToast('✅ Đã tải: ' + lc + ' từ đã học, ' + cc + ' từ đã thuộc', 'success', 3000);
  }
  renderAll();
}

function saveAll() {
  try {
    localStorage.setItem('kr-vocab-sr', JSON.stringify(srData));
    localStorage.setItem('kr-vocab-checked', JSON.stringify(checkedWords));
    storageOk = true;
  } catch(e) {
    storageOk = false;
    showToast('⚠️ Lưu thất bại — hãy Export backup!', 'error', 4000);
  }
  updateStorageBadge();
}

// Export/Import backup
function exportData() {
  const data = { srData, checkedWords, exportDate: new Date().toISOString(), version: 2 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'korean-vocab-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Đã export backup!', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.srData) srData = data.srData;
      if (data.checkedWords) checkedWords = data.checkedWords;
      await saveAll();
      renderAll();
      showToast('📥 Đã khôi phục tiến trình!', 'success', 3000);
    } catch(err) {
      showToast('❌ File không hợp lệ', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// TTS — improved settings
// ═══════════════════════════════════════════════════════
let voicesLoaded = false;
function loadVoices() {
  if (voicesLoaded) return;
  speechSynthesis.getVoices();
  voicesLoaded = true;
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speakKorean(text, rate) {
  if (!text || typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();
  rate = rate || 0.75;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = rate;
  u.pitch = 1.0;
  u.volume = 1.0;
  const voices = speechSynthesis.getVoices();
  // Prefer Yuna (iOS) or any high-quality Korean voice
  const preferred = voices.find(v => v.lang === 'ko-KR' && v.name.includes('Yuna'))
    || voices.find(v => v.lang === 'ko-KR' && !v.name.includes('Google'))
    || voices.find(v => v.lang.startsWith('ko'));
  if (preferred) u.voice = preferred;
  speechSynthesis.speak(u);
}

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Nav highlight
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'home') document.getElementById('nav-home').classList.add('active');
  else if (id === 'checklist-screen') { document.getElementById('nav-checklist').classList.add('active'); renderChecklist(); }
  else if (id === 'stats-screen') { document.getElementById('nav-stats').classList.add('active'); renderStats(); }
  window.scrollTo(0,0);
}

// SR calc
function calcSR(sr, quality) {
  let {interval,ease,reps} = sr;
  if (quality < 2) { reps=0; interval=1; }
  else { reps++; if(reps===1) interval=1; else if(reps===2) interval=6; else interval=Math.round(interval*ease); ease=Math.max(1.3,ease+(0.1-(3-quality)*0.15)); }
  return {interval,ease,reps,nextReview:Date.now()+interval*60000,lastReview:Date.now()};
}

function updateSR(kr, quality) {
  const cur = srData[kr] || {interval:0,ease:2.5,reps:0,nextReview:0,lastReview:0};
  srData[kr] = calcSR(cur, quality);
  saveAll();
}

function getLearnedCount() { return Object.keys(srData).filter(k=>srData[k]&&srData[k].reps>0).length; }
function getDueCount() { return Object.keys(srData).filter(k=>srData[k]&&srData[k].nextReview<=Date.now()).length; }
function getCheckedCount() { return Object.keys(checkedWords).filter(k=>checkedWords[k]).length; }

function renderHome() {
  const learned = getLearnedCount(), due = getDueCount(), total = allWords.length;
  const pct = Math.round((learned/total)*100);
  document.getElementById('p-learned').textContent = learned;
  document.getElementById('p-due').textContent = due;
  document.getElementById('p-due').className = 'p-num' + (due > 0 ? ' red' : ' green');
  document.getElementById('p-total').textContent = total;
  document.getElementById('p-bar').style.width = pct + '%';
  document.getElementById('p-pct').textContent = pct + '% hoàn thành';
  const rb = document.getElementById('review-btn');
  if (due > 0) { rb.style.display = 'block'; rb.textContent = '🔄 Ôn tập ngay (' + due + ' từ)'; }
  else rb.style.display = 'none';

  let html = '';
  UNITS.forEach(u => {
    let wc = 0, lc = 0;
    u.groups.forEach(g => { wc += g.words.length; g.words.forEach(w => { if(srData[w.kr]&&srData[w.kr].reps>0) lc++; }); });
    const p = Math.round((lc/wc)*100);
    html += `<button class="unit-card" onclick="openUnit(${u.id})">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-num">Bài ${u.id}</div>
      <div class="unit-kr">${u.title}</div>
      <div class="unit-vi">${u.subtitle}</div>
      <div class="unit-bar"><div class="unit-bar-fill" style="width:${p}%"></div></div>
      <div class="unit-count">${lc}/${wc}</div>
    </button>`;
  });
  document.getElementById('units-grid').innerHTML = html;
}

function startFlashcard(unitId, groupIdx, backTo) {
  const unit = UNITS.find(u=>u.id===unitId);
  if (!unit) return;
  fcWords = unit.groups[groupIdx].words;
  fcOrder = shuffle([...Array(fcWords.length).keys()]);
  fcIdx = 0; fcFlipped = false;
  fcBackTarget = backTo;
  document.getElementById('fc-back-btn').onclick = () => { showScreen(fcBackTarget); renderHome(); };
  document.getElementById('fc-title').textContent = unit.title + ' · ' + unit.groups[groupIdx].name;
  renderFlashcard();
  showScreen('fc-screen');
}

function startReview() {
  const due = allWords.filter(w => srData[w.kr] && srData[w.kr].nextReview <= Date.now());
  const words = due.length > 0 ? due.slice(0,20) : shuffle(allWords).slice(0,10);
  // Create a "virtual" group
  fcWords = words;
  fcOrder = shuffle([...Array(fcWords.length).keys()]);
  fcIdx = 0; fcFlipped = false;
  fcBackTarget = 'home';
  document.getElementById('fc-back-btn').onclick = () => { showScreen('home'); renderHome(); };
  document.getElementById('fc-title').textContent = '🔄 Ôn tập';
  renderFlashcard();
  showScreen('fc-screen');
}

function renderFlashcard() {
  if (fcIdx >= fcWords.length || fcIdx >= fcOrder.length) {
    document.getElementById('done-emoji').textContent = '🎉';
    document.getElementById('done-title').textContent = 'Hoàn thành!';
    document.getElementById('done-sub').textContent = 'Đã ôn ' + fcWords.length + ' từ vựng';
    document.getElementById('done-btn').onclick = () => { showScreen(fcBackTarget); renderHome(); };
    showScreen('done-screen');
    return;
  }
  const w = fcWords[fcOrder[fcIdx]];
  if (!w) { fcIdx++; renderFlashcard(); return; } // safety
  document.getElementById('fc-counter').textContent = (fcIdx+1) + ' / ' + fcWords.length;
  document.getElementById('fc-emoji').textContent = w.emoji;
  document.getElementById('fc-kr').textContent = w.kr;
  document.getElementById('fc-rom').textContent = w.rom;
  document.getElementById('fc-emoji2').textContent = w.emoji;
  document.getElementById('fc-kr2').textContent = w.kr;
  document.getElementById('fc-vi').textContent = w.vi;
  document.getElementById('fc-en').textContent = w.en;
  document.getElementById('fc-rom2').textContent = w.rom;
  fcFlipped = false;
  document.getElementById('fc-inner').classList.remove('flipped');
  document.getElementById('fc-rates').style.display = 'none';
  document.getElementById('fc-speak-btn').onclick = (e) => { e.stopPropagation(); speakKorean(w.kr); };
}

document.getElementById('fc-wrapper').addEventListener('click', () => {
  if (!fcFlipped && fcIdx < fcWords.length) {
    fcFlipped = true;
    document.getElementById('fc-inner').classList.add('flipped');
    document.getElementById('fc-rates').style.display = 'flex';
    const w = fcWords[fcOrder[fcIdx]];
    if (w) speakKorean(w.kr);
  }
});

function rateCard(q) {
  const w = fcWords[fcOrder[fcIdx]];
  if (w) updateSR(w.kr, q);
  fcIdx++;
  renderFlashcard();
}

// QUIZ
// ═══════════════════════════════════════════════════════
function startQuiz(unitId, groupIdx, backTo) {
  const unit = UNITS.find(u=>u.id===unitId);
  if (!unit) return;
  const words = unit.groups[groupIdx].words;
  quizBackTarget = backTo;
  document.getElementById('quiz-back-btn').onclick = () => { showScreen(quizBackTarget); renderHome(); };
  document.getElementById('quiz-title').textContent = 'Quiz · ' + unit.title;

  const qs = shuffle(words).slice(0, Math.min(10, words.length)).map(w => {
    const mode = Math.random() > 0.5 ? 'kr2vi' : 'vi2kr';
    const correct = mode === 'kr2vi' ? w.vi : w.kr;
    const prompt = mode === 'kr2vi' ? w.kr : w.vi;
    const pool = mode === 'kr2vi'
      ? allWords.filter(x=>x.vi!==w.vi).map(x=>x.vi)
      : allWords.filter(x=>x.kr!==w.kr).map(x=>x.kr);
    const opts = shuffle([correct, ...shuffle(pool).slice(0,3)]);
    return { word:w, mode, prompt, correct, options:opts };
  });
  quizState = { questions:qs, idx:0, score:0, selected:false, currentPromptKr:'' };
  renderQuiz();
  showScreen('quiz-screen');
}

function renderQuiz() {
  const {questions, idx, score} = quizState;
  if (idx >= questions.length) {
    const pct = score >= questions.length * 0.7;
    document.getElementById('done-emoji').textContent = pct ? '🏆' : '💪';
    document.getElementById('done-title').textContent = score + ' / ' + questions.length;
    document.getElementById('done-sub').textContent = pct ? 'Xuất sắc!' : 'Tiếp tục cố gắng!';
    document.getElementById('done-btn').onclick = () => { showScreen(quizBackTarget); renderHome(); };
    showScreen('done-screen');
    return;
  }
  const q = questions[idx];
  document.getElementById('quiz-counter').textContent = 'Câu ' + (idx+1) + '/' + questions.length;
  document.getElementById('quiz-score').textContent = '✅ ' + score;
  document.getElementById('quiz-mode').textContent = q.mode === 'kr2vi' ? 'Nghĩa tiếng Việt của:' : 'Từ tiếng Hàn của:';
  document.getElementById('quiz-prompt').innerHTML = (q.word.emoji||'') + ' ' + q.prompt;
  quizState.currentPromptKr = q.mode === 'kr2vi' ? q.prompt : '';
  document.getElementById('quiz-speak').style.display = q.mode === 'kr2vi' ? 'inline-block' : 'none';

  let html = '';
  q.options.forEach((opt, i) => {
    html += `<button class="opt-btn" id="opt-${i}" onclick="selectQuizOpt(${i})">${opt}</button>`;
  });
  document.getElementById('quiz-opts').innerHTML = html;
  quizState.selected = false;
}

function selectQuizOpt(i) {
  if (quizState.selected) return;
  quizState.selected = true;
  const q = quizState.questions[quizState.idx];
  const sel = q.options[i];
  const correct = sel === q.correct;
  if (correct) { quizState.score++; updateSR(q.word.kr, 3); }
  else updateSR(q.word.kr, 0);

  q.options.forEach((opt, j) => {
    const el = document.getElementById('opt-'+j);
    if (opt === q.correct) el.classList.add('correct');
    else if (j === i) el.classList.add('wrong');
  });

  setTimeout(() => { quizState.idx++; renderQuiz(); }, 1100);
}

// ═══════════════════════════════════════════════════════
// CHECKLIST
// ═══════════════════════════════════════════════════════
function renderChecklist() {
  const checked = getCheckedCount();
  document.getElementById('cl-stats').textContent = `✅ ${checked} / ${allWords.length} đã thuộc`;

  // Filter buttons
  let fhtml = `<button class="filter-btn ${clFilter==='all'?'active':''}" onclick="clFilter='all';renderChecklist()">Tất cả</button>`;
  fhtml += `<button class="filter-btn ${clFilter==='unchecked'?'active':''}" onclick="clFilter='unchecked';renderChecklist()">Chưa thuộc</button>`;
  fhtml += `<button class="filter-btn ${clFilter==='checked'?'active':''}" onclick="clFilter='checked';renderChecklist()">Đã thuộc</button>`;
  UNITS.forEach(u => {
    fhtml += `<button class="filter-btn ${clFilter==='unit-'+u.id?'active':''}" onclick="clFilter='unit-${u.id}';renderChecklist()">Bài ${u.id}</button>`;
  });
  document.getElementById('cl-filter').innerHTML = fhtml;

  let html = '';
  UNITS.forEach(u => {
    if (clFilter.startsWith('unit-') && clFilter !== 'unit-'+u.id) return;
    let groupHtml = '';
    u.groups.forEach(g => {
      g.words.forEach(w => {
        const isChecked = !!checkedWords[w.kr];
        if (clFilter === 'checked' && !isChecked) return;
        if (clFilter === 'unchecked' && isChecked) return;
        groupHtml += `<div class="cl-word">
          <div class="cl-check ${isChecked?'checked':''}" onclick="toggleCheck('${w.kr.replace(/'/g,"\\'")}')">
            ${isChecked ? '✓' : ''}
          </div>
          <div class="cl-info">
            <div class="cl-kr">${w.kr} <span style="font-size:11px;color:#aaa">${w.rom}</span></div>
            <div class="cl-vi">${w.emoji} ${w.vi} · ${w.en}</div>
          </div>
          <button class="cl-speak-btn" onclick="speakKorean('${w.kr.replace(/'/g,"\\'")}')">🔊</button>
        </div>`;
      });
    });
    if (groupHtml) {
      html += `<div class="cl-unit-group">
        <div class="cl-unit-title">${u.icon} Bài ${u.id}: ${u.title} — ${u.subtitle}</div>
        <div class="cl-card">${groupHtml}</div>
      </div>`;
    }
  });
  document.getElementById('cl-list').innerHTML = html || '<div style="text-align:center;color:#aaa;padding:40px">Không có từ nào</div>';
}

function toggleCheck(kr) {
  checkedWords[kr] = !checkedWords[kr];
  saveAll();
  renderChecklist();
}

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function renderStats() {
  let html = '';
  UNITS.forEach(u => {
    let wc=0, lc=0, mc=0;
    u.groups.forEach(g => { wc+=g.words.length; g.words.forEach(w => { if(srData[w.kr]&&srData[w.kr].reps>0) lc++; if(srData[w.kr]&&srData[w.kr].reps>=3) mc++; }); });
    const p = Math.round((lc/wc)*100);
    html += `<div class="stat-row">
      <div class="stat-icon">${u.icon}</div>
      <div class="stat-info">
        <div class="stat-title">Bài ${u.id}: ${u.title}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
      </div>
      <div class="stat-nums">
        <div class="stat-learned">${lc}/${wc}</div>
        <div class="stat-mastered">⭐${mc}</div>
      </div>
    </div>`;
  });
  document.getElementById('stats-list').innerHTML = html;
}

// ═══════════════════════════════════════════════════════

// Play all words in a group sequentially
let playAllTimeout = null;
function playAllWords(unitId, groupIdx) {
  const unit = UNITS.find(u=>u.id===unitId);
  if (!unit) return;
  const words = unit.groups[groupIdx].words;
  clearTimeout(playAllTimeout);
  let i = 0;
  function playNext() {
    if (i >= words.length) return;
    speakKorean(words[i].kr, 0.8);
    i++;
    playAllTimeout = setTimeout(playNext, 2000);
  }
  playNext();
}

// INIT
// ═══════════════════════════════════════════════════════
loadData();

// Auto-save when user leaves the page or switches tabs
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveAll();
});
window.addEventListener('beforeunload', () => saveAll());

// Periodic auto-save every 30 seconds
setInterval(() => {
  if (getLearnedCount() > 0 || getCheckedCount() > 0) saveAll();
}, 30000);
</script>
